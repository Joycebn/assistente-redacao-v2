<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minha Redação — Passo a Passo</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Lexend+Deca:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --azul:    #2563eb;
  --azul-cl: #dbeafe;
  --azul-md: #93c5fd;
  --verde:   #16a34a;
  --verde-cl:#dcfce7;
  --roxo:    #7c3aed;
  --roxo-cl: #ede9fe;
  --laranja: #d97706;
  --laran-cl:#fef3c7;
  --rosa:    #db2777;
  --rosa-cl: #fce7f3;
  --bg:      #f0f4ff;
  --card:    #ffffff;
  --texto:   #1e293b;
  --suave:   #64748b;
  --borda:   #e2e8f0;
  --sombra:  0 2px 16px rgba(37,99,235,0.10);
  --r:       18px;
}

body {
  font-family: 'Lexend', sans-serif;
  background: var(--bg);
  color: var(--texto);
  min-height: 100vh;
  font-size: 17px;
  line-height: 1.7;
  padding-bottom: 80px;
}

/* ── HEADER ──────────────────────────────────────────────── */
.header {
  background: linear-gradient(135deg, #1d4ed8, #4f46e5, #7c3aed);
  padding: 28px 24px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 24px;
  background: var(--bg);
  border-radius: 24px 24px 0 0;
}
.header h1 {
  font-size: 1.8rem; font-weight: 800;
  color: #fff; letter-spacing: -0.5px;
}
.header p { color: rgba(255,255,255,0.82); font-size: 1rem; margin-top: 4px; }

/* ── PROGRESSO GERAL ─────────────────────────────────────── */
.progresso-geral {
  max-width: 680px; margin: 20px auto 0; padding: 0 20px;
}
.barra-wrap { background: #e2e8f0; border-radius: 8px; height: 8px; overflow: hidden; }
.barra-fill {
  height: 100%;
  background: linear-gradient(90deg, #2563eb, #7c3aed);
  border-radius: 8px;
  transition: width .5s ease;
}
.barra-label {
  font-size: 0.8rem; font-weight: 700; color: var(--suave);
  margin-top: 6px; text-align: right;
}

/* ── RASCUNHO FLUTUANTE ──────────────────────────────────── */
.fab {
  position: fixed; bottom: 24px; right: 20px;
  background: #1d4ed8; color: #fff;
  border: none; border-radius: 50px;
  padding: 14px 20px; font-family: 'Lexend', sans-serif;
  font-size: 0.9rem; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 20px rgba(29,78,216,0.4);
  display: flex; align-items: center; gap: 8px;
  transition: transform .2s;
  z-index: 100;
}
.fab:hover { transform: scale(1.05); }

/* ── MODAL RASCUNHO ──────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.6);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-overlay.aberto { opacity: 1; pointer-events: all; }
.modal {
  background: #fff; border-radius: 20px;
  width: 100%; max-width: 640px;
  max-height: 85vh; overflow-y: auto;
  padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  transform: translateY(20px); transition: transform .25s;
}
.modal-overlay.aberto .modal { transform: translateY(0); }
.modal-titulo {
  font-size: 1.1rem; font-weight: 800; color: #1d4ed8; margin-bottom: 20px;
  display: flex; justify-content: space-between; align-items: center;
}
.btn-fechar {
  background: #f1f5f9; border: none; border-radius: 8px;
  padding: 6px 12px; cursor: pointer; font-size: 1rem;
}
.paragrafo-preview {
  background: #f8faff; border-left: 4px solid #2563eb;
  border-radius: 0 12px 12px 0;
  padding: 14px 16px; margin-bottom: 14px;
  font-size: 0.92rem; line-height: 1.8;
  color: var(--texto); min-height: 40px;
}
.paragrafo-preview.vazio {
  color: #94a3b8; font-style: italic;
}
.paragrafo-preview span.tag {
  display: inline-block;
  background: #dbeafe; color: #1d4ed8;
  border-radius: 6px; padding: 1px 8px;
  font-size: 0.78rem; font-weight: 700;
  margin-right: 4px; margin-bottom: 2px;
}
.btn-copiar {
  width: 100%; padding: 13px; border-radius: 12px;
  background: #1d4ed8; color: #fff; border: none;
  font-family: 'Lexend', sans-serif; font-size: 1rem; font-weight: 700;
  cursor: pointer; margin-top: 8px;
}

/* ── CARDS ───────────────────────────────────────────────── */
.main { max-width: 680px; margin: 24px auto 0; padding: 0 16px; }

.card {
  background: var(--card);
  border-radius: var(--r);
  box-shadow: var(--sombra);
  padding: 24px;
  margin-bottom: 20px;
  border-top: 5px solid var(--cor-etapa, #2563eb);
  animation: subir .3s ease;
}
@keyframes subir { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.etapa-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--cor-etapa-cl, #dbeafe);
  color: var(--cor-etapa, #2563eb);
  border-radius: 30px; padding: 5px 14px;
  font-size: 0.8rem; font-weight: 800;
  margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;
}
.card h2 {
  font-size: 1.25rem; font-weight: 800;
  color: var(--texto); margin-bottom: 4px;
}
.card .descricao {
  font-size: 0.92rem; color: var(--suave);
  margin-bottom: 20px; line-height: 1.6;
}

/* ── CAMPO TEMA ──────────────────────────────────────────── */
.campo-tema input {
  width: 100%; padding: 14px 16px;
  border: 2.5px solid var(--borda); border-radius: 12px;
  font-family: 'Lexend', sans-serif; font-size: 1rem;
  color: var(--texto); background: #f8faff; outline: none;
  transition: border .2s;
}
.campo-tema input:focus { border-color: #2563eb; background: #fff; }
.campo-label {
  font-size: 0.85rem; font-weight: 700;
  color: var(--suave); margin-bottom: 8px; display: block;
}

/* ── OPÇÕES DE ESCOLHA (chips grandes) ───────────────────── */
.opcoes-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 20px;
}
@media (max-width: 500px) { .opcoes-grid { grid-template-columns: 1fr; } }

.opcao-card {
  border: 2.5px solid var(--borda);
  border-radius: 14px; padding: 14px 16px;
  cursor: pointer; transition: all .2s;
  background: #fff;
  display: flex; flex-direction: column; gap: 4px;
}
.opcao-card:hover { border-color: var(--cor-etapa, #2563eb); background: #f8faff; transform: translateY(-2px); }
.opcao-card.selecionada {
  border-color: var(--cor-etapa, #2563eb);
  background: var(--cor-etapa-cl, #dbeafe);
}
.opcao-icone { font-size: 1.5rem; }
.opcao-titulo { font-size: 0.95rem; font-weight: 700; color: var(--texto); }
.opcao-desc   { font-size: 0.8rem; color: var(--suave); line-height: 1.4; }

/* ── CONECTIVOS (pills) ──────────────────────────────────── */
.secao-titulo {
  font-size: 0.82rem; font-weight: 800; color: var(--suave);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 10px; margin-top: 20px;
}
.pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.pill {
  padding: 8px 16px; border-radius: 30px;
  border: 2.5px solid var(--borda);
  background: #fff; cursor: pointer;
  font-family: 'Lexend', sans-serif;
  font-size: 0.88rem; font-weight: 600;
  color: var(--suave); transition: all .2s;
}
.pill:hover { border-color: var(--cor-etapa, #2563eb); color: var(--cor-etapa, #2563eb); }
.pill.selecionada {
  border-color: var(--cor-etapa, #2563eb);
  background: var(--cor-etapa, #2563eb);
  color: #fff;
}

/* ── PREVIEW DA FRASE ────────────────────────────────────── */
.preview-frase {
  background: #f8faff; border: 2px dashed #93c5fd;
  border-radius: 12px; padding: 14px 16px;
  font-size: 0.95rem; line-height: 1.7;
  color: var(--texto); margin: 16px 0;
  min-height: 56px; transition: all .3s;
}
.preview-frase .slot-vazio { color: #94a3b8; font-style: italic; }
.preview-frase .slot-preenchido { color: #1d4ed8; font-weight: 700; }
.preview-frase .slot-conectivo {
  background: #dbeafe; color: #1d4ed8;
  border-radius: 6px; padding: 1px 8px;
  font-weight: 800;
}
.preview-frase .slot-tipo {
  background: #ede9fe; color: #7c3aed;
  border-radius: 6px; padding: 1px 8px;
  font-weight: 700;
}

/* ── DICA ────────────────────────────────────────────────── */
.dica {
  display: flex; gap: 10px; align-items: flex-start;
  background: #fefce8; border-radius: 12px;
  padding: 12px 14px; margin: 14px 0;
  font-size: 0.88rem; color: #92400e; line-height: 1.5;
}
.dica-icone { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }

/* ── TEXTAREA ────────────────────────────────────────────── */
.campo-livre textarea {
  width: 100%; padding: 13px 15px;
  border: 2.5px solid var(--borda); border-radius: 12px;
  font-family: 'Lexend', sans-serif; font-size: 0.95rem;
  color: var(--texto); background: #f8faff; outline: none;
  resize: vertical; line-height: 1.6; transition: border .2s;
}
.campo-livre textarea:focus { border-color: var(--cor-etapa, #2563eb); background: #fff; }

/* ── BOTÕES ──────────────────────────────────────────────── */
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 22px; border-radius: 12px; border: none;
  font-family: 'Lexend', sans-serif; font-size: 0.95rem; font-weight: 700;
  cursor: pointer; transition: all .2s;
}
.btn-primario {
  background: var(--cor-etapa, #2563eb); color: #fff;
  box-shadow: 0 4px 14px rgba(37,99,235,0.3);
}
.btn-primario:hover { filter: brightness(1.1); transform: translateY(-2px); }
.btn-primario:disabled { opacity: .5; cursor: not-allowed; transform: none; filter: none; }
.btn-secundario { background: #f1f5f9; color: var(--suave); }
.btn-secundario:hover { background: #e2e8f0; }
.btn-fantasma {
  background: transparent; color: var(--cor-etapa, #2563eb);
  border: 2.5px solid var(--cor-etapa, #2563eb);
}
.btn-fantasma:hover { background: var(--cor-etapa, #2563eb); color: #fff; }

/* ── SUGESTÕES DA IA ─────────────────────────────────────── */
.ia-box {
  background: linear-gradient(135deg, #f8faff, #ede9fe);
  border: 2px solid #c4b5fd; border-radius: 14px;
  padding: 16px; margin: 16px 0; position: relative;
}
.ia-box::before {
  content: '✨ Ideias do assistente';
  display: block;
  font-size: 0.75rem; font-weight: 800; color: #7c3aed;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
}
.ia-sugestao {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  border: 2px solid #e2e8f0; background: #fff;
  margin-bottom: 8px; cursor: pointer; transition: all .2s;
  font-size: 0.9rem; line-height: 1.5;
}
.ia-sugestao:hover { border-color: #7c3aed; background: #faf5ff; }
.ia-sugestao.usada { border-color: #7c3aed; background: #ede9fe; }
.ia-num {
  min-width: 22px; height: 22px; border-radius: 6px;
  background: #7c3aed; color: #fff; font-size: 0.72rem; font-weight: 800;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.typing { display: flex; gap: 5px; align-items: center; padding: 8px 0; }
.typing span { width: 9px; height: 9px; border-radius: 50%; background: #7c3aed; animation: bounce 1.1s infinite; }
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,80%,100%{transform:scale(.7);opacity:.5} 40%{transform:scale(1.1);opacity:1} }

/* ── TOAST ───────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 88px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #1e293b; color: #fff;
  padding: 12px 22px; border-radius: 30px;
  font-size: 0.88rem; font-weight: 700;
  transition: transform .3s; z-index: 300; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── REDAÇÃO FINAL ───────────────────────────────────────── */
.redacao-completa {
  background: #fff; border: 2px solid #e2e8f0;
  border-radius: 14px; padding: 22px;
  font-size: 1rem; line-height: 1.9; color: var(--texto);
  white-space: pre-wrap; word-break: break-word;
}
.paragrafo-numero {
  font-size: 0.72rem; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase; color: var(--suave); margin-bottom: 4px;
}

/* ── MOBILE ──────────────────────────────────────────────── */
@media (max-width: 480px) {
  .header h1 { font-size: 1.4rem; }
  .card { padding: 18px 14px; }
  .btn { padding: 12px 16px; font-size: 0.9rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>✏️ Minha Redação</h1>
  <p>Vamos construir juntos, passo a passo!</p>
</div>

<div class="progresso-geral" id="progressoWrap">
  <div class="barra-wrap">
    <div class="barra-fill" id="barraFill" style="width:5%"></div>
  </div>
  <div class="barra-label" id="barraLabel">Etapa 1 de 12</div>
</div>

<div class="main" id="appMain"></div>

<!-- BOTÃO RASCUNHO -->
<button class="fab" onclick="abrirRascunho()">📄 Ver rascunho</button>

<!-- MODAL RASCUNHO -->
<div class="modal-overlay" id="modalRascunho">
  <div class="modal">
    <div class="modal-titulo">
      📄 Minha Redação até agora
      <button class="btn-fechar" onclick="fecharRascunho()">✕</button>
    </div>
    <div id="conteudoRascunho"></div>
    <button class="btn-copiar" onclick="copiarRedacao()">📋 Copiar tudo</button>
  </div>
</div>

<div class="toast" id="toast">✅ Copiado!</div>

<script>
// ════════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ════════════════════════════════════════════════════════════
const E = {
  tema: "",
  // Introdução
  intro: {
    tipoContexto: "",    // historico | atual | filosofo | definicao | dado
    textoContexto: "",
    conectivoProblema: "",
    textoProblema: "",
    conectivoTese: "",
    textoTese: "",
    conectivoArgs: "",
    arg1: "", arg2: "",
  },
  // Desenvolvimento 1
  dev1: {
    conectivoAbertura: "",
    textoDesenv: "",
    conectivoRepertorio: "",
    textoRepertorio: "",
  },
  // Desenvolvimento 2
  dev2: {
    conectivoAbertura: "",
    textoDesenv: "",
    conectivoRepertorio: "",
    textoRepertorio: "",
  },
  // Conclusão
  conclusao: {
    conectivoRetomada: "",
    textoRetomada: "",
    agente: "",
    comoResolver: "",
    conectivoProposta: "",
    textoProposta: "",
    fraseFinal: "",
  },
  etapaAtual: 0,
  totalEtapas: 12,
};

// ════════════════════════════════════════════════════════════
// API
// ════════════════════════════════════════════════════════════
async function pedirIdeia(system, user) {
  const r = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system, userMessage: user })
  });
  if (!r.ok) throw new Error('Erro na conexão');
  const d = await r.json();
  return d.text || '';
}

function parseLista(texto) {
  return texto.split('\n')
    .map(l => l.replace(/^\d+[\.\)]\*?\*?\s*/, '').replace(/\*\*/g,'').trim())
    .filter(l => l.length > 8);
}

// ════════════════════════════════════════════════════════════
// ETAPAS
// ════════════════════════════════════════════════════════════
const ETAPAS = [
  renderEtapa0_tema,
  renderEtapa1_contexto,
  renderEtapa2_problema,
  renderEtapa3_tese,
  renderEtapa4_args,
  renderEtapa5_dev1abertura,
  renderEtapa6_dev1repertorio,
  renderEtapa7_dev2abertura,
  renderEtapa8_dev2repertorio,
  renderEtapa9_conclusaoRetomada,
  renderEtapa10_proposta,
  renderEtapa11_final,
];

const NOMES_ETAPAS = [
  "Tema","Contextualização","Apresentação do Problema","Tese","Argumentos",
  "Desenvolvimento 1","Repertório 1","Desenvolvimento 2","Repertório 2",
  "Conclusão — Retomada","Proposta de Solução","Redação Completa"
];

function ir(n) {
  E.etapaAtual = n;
  atualizarProgresso();
  const fn = ETAPAS[n];
  if (fn) fn();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function atualizarProgresso() {
  const pct = Math.round((E.etapaAtual / (E.totalEtapas - 1)) * 100);
  document.getElementById('barraFill').style.width = pct + '%';
  document.getElementById('barraLabel').textContent =
    `${NOMES_ETAPAS[E.etapaAtual]} — Etapa ${E.etapaAtual + 1} de ${E.totalEtapas}`;
}

// ────── COR POR SEÇÃO ─────────────────────────────────────
function corEtapa(n) {
  if (n <= 4) return { cor: '#2563eb', cl: '#dbeafe' };
  if (n <= 8) return { cor: '#16a34a', cl: '#dcfce7' };
  return { cor: '#7c3aed', cl: '#ede9fe' };
}
function aplicarCor(n) {
  const { cor, cl } = corEtapa(n);
  document.documentElement.style.setProperty('--cor-etapa', cor);
  document.documentElement.style.setProperty('--cor-etapa-cl', cl);
}

// ── HELPER: montar HTML do card ───────────────────────────
function card(badge, icone, titulo, desc, conteudo) {
  return `
    <div class="card">
      <div class="etapa-badge">${icone} ${badge}</div>
      <h2>${titulo}</h2>
      <p class="descricao">${desc}</p>
      ${conteudo}
    </div>`;
}

// ── HELPER: pills ─────────────────────────────────────────
function pillsHTML(lista, selecionada, onClickFn) {
  return `<div class="pills">${lista.map(p =>
    `<button class="pill ${selecionada===p?'selecionada':''}"
      onclick="${onClickFn}('${p.replace(/'/g,"\\'")}')">${p}</button>`
  ).join('')}</div>`;
}

// ── HELPER: preview com slots ─────────────────────────────
function previewHTML(partes) {
  // partes = array de { tipo: 'texto'|'conectivo'|'tipo'|'vazio', valor }
  const html = partes.map(p => {
    if (p.tipo === 'conectivo') return `<span class="slot-conectivo">${p.valor}</span>`;
    if (p.tipo === 'tipo')      return `<span class="slot-tipo">${p.valor}</span>`;
    if (p.tipo === 'vazio')     return `<span class="slot-vazio">[${p.valor}]</span>`;
    return `<span class="slot-preenchido">${p.valor}</span>`;
  }).join(' ');
  return `<div class="preview-frase">${html}</div>`;
}

// ════════════════════════════════════════════════════════════
// ETAPA 0 — TEMA
// ════════════════════════════════════════════════════════════
function renderEtapa0_tema() {
  aplicarCor(0);
  const sugeridos = [
    'Combate ao racismo no Brasil',
    'Tecnologia em sala de aula',
    'Violência contra a mulher',
    'Saúde mental entre jovens',
    'Desigualdade social no Brasil',
    'Maus-tratos a animais',
    'Impacto das redes sociais',
    'Desmatamento da Amazônia',
  ];
  document.getElementById('appMain').innerHTML = card(
    'Começo', '🎯', 'Qual é o tema da redação?',
    'Digite o tema ou escolha um da lista abaixo.',
    `<div class="campo-tema">
      <label class="campo-label">✏️ Escreva o tema:</label>
      <input type="text" id="inputTema" placeholder="Ex: Os desafios do combate ao racismo no Brasil"
        value="${E.tema}" oninput="E.tema=this.value"/>
    </div>
    <div class="secao-titulo" style="margin-top:16px">Ou escolha um tema:</div>
    <div class="pills">
      ${sugeridos.map(t =>
        `<button class="pill ${E.tema===t?'selecionada':''}"
          onclick="escolherTema('${t.replace(/'/g,"\\'")}')">${t}</button>`
      ).join('')}
    </div>
    <div class="btn-row">
      <button class="btn btn-primario" onclick="confirmarTema()" ${!E.tema?'disabled':''}>
        Continuar →
      </button>
    </div>`
  );
}

function escolherTema(t) {
  E.tema = t;
  document.getElementById('inputTema').value = t;
  renderEtapa0_tema();
}
function confirmarTema() {
  E.tema = document.getElementById('inputTema')?.value?.trim() || E.tema;
  if (!E.tema) return;
  ir(1);
}

    ]},
  ];

  wrap.innerHTML = paragrafos.map(pg => {
    const texto = pg.partes.filter(Boolean).join(' ').trim();
    return `
      <div style="margin-bottom:14px">
        <div style="font-size:.72rem;font-weight:800;color:#6366f1;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">${pg.label}</div>
        <div class="paragrafo-preview ${!texto?'vazio':''}">${texto || 'Ainda não preenchido...'}</div>
      </div>`;
  }).join('');

  document.getElementById('modalRascunho').classList.add('aberto');
}

function fecharRascunho() {
  document.getElementById('modalRascunho').classList.remove('aberto');
}

function copiarRedacao() {
  const divs = document.querySelectorAll('.paragrafo-preview:not(.vazio)');
  const texto = Array.from(divs).map(d => d.textContent.trim()).join('\n\n');
  if (!texto) { mostrarToast('⚠️ Nada para copiar ainda!'); return; }
  navigator.clipboard.writeText(texto).then(() => mostrarToast('✅ Copiado!'));
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

ir(0);
